# ============================================================
#  SearXNG — settings.yml
#  Optimized for AI Use Cases (Hermes Agent, OpenWebUI, GPT-Researcher)
# ============================================================

use_default_settings:
  engines:
    remove:
      - torch
      - ahmia

general:
  debug: false
  instance_name: "$SEARXNG_INSTANCE_NAME"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

server:
  secret_key: ""                        # Automatically set from env -> SEARXNG_SECRET_KEY, leave empty
  limiter: true                         # Rate limiting via Valkey
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# ============================================================
#  UI Settings
# ============================================================
ui:
  default_locale: "$SEARXNG_DEFAULT_LOCALE"
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

# ============================================================
#  SEARCH — Accepted formats
#  CRITICAL: JSON and RSS need to be active to work viable with
#  Hermes Agent, OpenWebUI, GPT-Researcher via API
# ============================================================
search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 86400
    SearxEngineCaptcha: 86400
    SearxEngineTooManyRequests: 3600
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json       # ← REQUIRED for Hermes + GPT-Researcher API calls
    - csv
    - rss        # ← REQUIRED for news aggregation

# ============================================================
#  ENGINES — Grouped by use-case
#
#  Categories for perplexity-like use-cases:
#    general    → web search
#    news       → news section
#    science    → academic search
#    social     → social media monitoring
#    finance    → financial data (via DuckDuckGo/Brave)
#    code       → code search (GitHub, StackOverflow)
#    it         → general IT search (StackExchange sites, GitHub)
# ============================================================
engines:

  # ---------- GENERAL / WEB ----------
  - name: google
    engine: google
    shortcut: g
    categories: [general, web]
    weight: 2

  - name: brave
    engine: brave
    shortcut: br
    categories: [general, web]
    weight: 2

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    categories: [general, web]
    weight: 1

  - name: bing
    engine: bing
    shortcut: b
    categories: [general, web]
    weight: 1
    disabled: true                      # Bing is sometimes more restrictive, keep disabled unless needed

  # ---------- NEWS ----------
  - name: google news
    engine: google_news
    shortcut: gn
    categories: [news]
    weight: 2

  - name: bing news
    engine: bing_news
    shortcut: bn
    categories: [news]
    weight: 1

  - name: brave news
    engine: brave
    shortcut: brn
    categories: [news]
    brave_category: news
    weight: 2

  - name: hackernews
    engine: hackernews
    shortcut: hn
    categories: [news, social, tech]
    weight: 1

  # ---------- ACADEMIC / SCIENCE ----------
  - name: google scholar
    engine: google_scholar
    shortcut: gs
    categories: [science, academic]
    weight: 3

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: ss
    categories: [science, academic]
    weight: 3

  - name: arxiv
    engine: arxiv
    shortcut: ax
    categories: [science, academic]
    weight: 3

  - name: pubmed
    engine: pubmed
    shortcut: pm
    categories: [science, academic, health]
    weight: 2

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: [general, science]
    weight: 1
    language: "en"

  # ---------- SOCIAL MEDIA ----------
  - name: reddit
    engine: reddit
    shortcut: re
    categories: [social, news]
    weight: 2
    page_size: 25

  - name: lemmy posts
    engine: lemmy
    shortcut: lepo
    categories: [social]
    weight: 2
    lemmy_type: posts

  - name: lemmy communities
    engine: lemmy
    shortcut: leco
    categories: [social]
    weight: 1
    lemmy_type: communities

  - name: mastodon hashtags
    engine: mastodon
    shortcut: mah
    categories: [social]
    weight: 1
    mastodon_type: hashtags

  - name: tootfinder
    engine: tootfinder
    shortcut: toot
    categories: [social]
    weight: 1

  # ---------- FINANCE (via general search limited to finance domains) ----------
  # SearXNG does not have a dedicated financial domain
  - name: duckduckgo finance
    engine: duckduckgo
    shortcut: ddgf
    categories: [finance]
    weight: 1
    disabled: true

  - name: reuters
    engine: reuters
    shortcut: reu
    categories: [finance, news]
    weight: 3

  # Brave already included in the news section

  - name: currency converter
    engine: currency_convert
    shortcut: curr
    categories: [finance]
    weight: 2

  - name: wolfram alpha
    engine: wolframalpha_api
    shortcut: wlf
    categories: [finance, science]
    api_key: "$WOLFRAM_API_KEY"
    disabled: $WOLFRAM_DISABLED
    weight: 2

  # ---------- CODE ----------
  - name: github
    engine: github
    shortcut: gh
    categories: [code, it]
    weight: 2

  - name: stack overflow
    engine: stack_exchange
    shortcut: so
    categories: [code, it]
    api_site: stackoverflow
    weight: 2

  # BONUS — other it sites
  - name: super user
    engine: stack_exchange
    shortcut: su
    categories: [it]
    api_site: superuser

  - name: server fault
    engine: stack_exchange
    shortcut: sf
    categories: [it]
    api_site: serverfault






# ============================================================
#  OUTGOING — HTTP client settings
# ============================================================
outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  retries: 1
  retry_on_http_error: true
  using_tor_proxy: false

# ============================================================
#  RATE LIMITER — Protecting personal instance, a little more permissive
# ============================================================
valkey:
  url: redis://datastore-memory:6379/0
