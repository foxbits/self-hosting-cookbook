services:
  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - home-lab-net
    ports:
      - "9704:8080"
    volumes:
      - ./searxng/core-config:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://searxng:8080/}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
      - SEARXNG_REDIS_URL=redis://datastore-memory:6379/0
      - FORCE_OWNERSHIP=true
    env_file:
      - .env
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "9705:11235"
    environment:
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-10}
    env_file:
      - .env
    shm_size: '3g' # agents count x parallel tabs x 150MB
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - home-lab-net
  gpt-researcher:
    build:
      context: ./gpt-researcher-scraper
      dockerfile: Dockerfile
    container_name: gpt-researcher
    restart: unless-stopped
    networks:
      - home-lab-net
    ports:
      - "9706:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://nano-gpt.com/api/v1}
      - RETRIEVER=searx
      - SEARX_URL=http://searxng:8080
      - SCRAPER=${SCRAPER:-crawl4ai}
      - CRAWL4AI_API_URL=${CRAWL4AI_API_URL:-http://crawl4ai:11235}
      - LOGGING_LEVEL=INFO
      - IMAGE_GENERATION_ENABLED=${IMAGE_GENERATION_ENABLED:-false}
      - IMAGE_GENERATION_PROVIDER=${IMAGE_GENERATION_PROVIDER:-openai}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - IMAGE_API_KEY=${IMAGE_API_KEY:-}
      - IMAGE_GENERATION_BASE_URL=${IMAGE_GENERATION_BASE_URL:-}
      - IMAGE_GENERATION_MODEL=${IMAGE_GENERATION_MODEL:-models/gemini-2.0-flash-preview-image-generation}
      - IMAGE_GENERATION_MAX_IMAGES=${IMAGE_GENERATION_MAX_IMAGES:-3}
      - FAST_LLM=${FAST_LLM:-moonshotai/kimi-k2.5}
      - SMART_LLM=${SMART_LLM:-minimax/minimax-m2.7}
      - EMBEDDING=${EMBEDDING:-openai:BAAI/bge-m3}
      - BROWSE_CHUNK_MAX_LENGTH=${BROWSE_CHUNK_MAX_LENGTH:-4000}
    volumes:
      - gpt-researcher-data:/usr/src/app/outputs:rw
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  searxng-data:
    driver: local
  gpt-researcher-data:
    driver: local

networks:
  home-lab-net:
    external: true
