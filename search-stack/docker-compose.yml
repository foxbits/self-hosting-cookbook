services:
  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - home-lab-net
    ports:
      - "9704:8080"
    volumes:
      - ./searxng/core-config:/etc/searxng:rw
      - searxng-data:/var/cache/searxng
    env_file:
      - .env
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "9705:11235"
    env_file:
      - .env
    shm_size: '3g' # agents count x parallel tabs x 150MB
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - home-lab-net
  open-crawl:
    build:
      context: ${OPENCRAWL_PATH}
      dockerfile: Dockerfile
    container_name: open-crawl
    restart: unless-stopped
    networks:
      - home-lab-net
    ports:
      - "9708:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  gpt-researcher:
    build:
      context: ${GPT_RESEARCHER_PATH}
      dockerfile: Dockerfile
    container_name: gpt-researcher
    restart: unless-stopped
    networks:
      - home-lab-net
    ports:
      - "9706:8000"
    volumes:
      - gpt-researcher-data:/usr/src/app/outputs:rw
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  searxng-data:
    driver: local
  gpt-researcher-data:
    driver: local

networks:
  home-lab-net:
    external: true
