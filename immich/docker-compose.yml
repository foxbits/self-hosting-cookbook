services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - DB_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@datastore-sql:5432/${DB_DATABASE_NAME}
    ports:
      - '2283:2283'
    restart: always
    healthcheck:
      disable: false
    networks:
      - home-lab-net

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    networks:
      - home-lab-net

networks:
  home-lab-net:
    external: true

volumes:
  model-cache: