services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: ${HUB_URL}
    ports:
      - 8090:8090
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - ./beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
      # Root disk host
      - /.beszel:/extra-filesystems/root:ro
      # Additional disks
      # - /mnt/sda2/.beszel:/extra-filesystems/sdc2__MEDIA_E:ro
      # - /mnt/sda3/.beszel:/extra-filesystems/sdc2__MEDIA_F:ro
      # - /mnt/sda4/.beszel:/extra-filesystems/sdc4__EsEsDee:ro
    security_opt:
      - apparmor:unconfined
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: ${HUB_URL}
      TOKEN: ${TOKEN}
      KEY: "${KEY}"