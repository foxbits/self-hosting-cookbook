services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    ports: [8191:8191]
    environment:
      - LOG_LEVEL=info
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    restart: unless-stopped
    ports: [9117:9117]
    environment:
      - PUID=${STACK_UID}
      - PGID=${STACK_GID}
      - TZ=${TimeZone}
      - AUTO_UPDATE=true
    volumes:
      - ./config/jackett:/config
      - ./config/jackett-downloads:/downloads
    depends_on:
      - flaresolverr
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    ports: [7878:7878]
    environment:
      - PUID=${STACK_UID}
      - PGID=${STACK_GID}
      - TZ=${TimeZone}
    volumes:
      - ./config/radarr:/config
    depends_on:
      - jackett
    extra_hosts:
    - "host.docker.internal:host-gateway"
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    ports: [8989:8989]
    environment:
      - PUID=${STACK_UID}
      - PGID=${STACK_GID}
      - TZ=${TimeZone}
    volumes:
      - ./config/sonarr:/config
    depends_on:
      - jackett
    extra_hosts:
    - "host.docker.internal:host-gateway"
